server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    location /api/ {
    # proxy_pass https://interview-mvp-production-3eef.up.railway.app/;
    proxy_pass http://backend:3001;

    # 🔑 Required for Railway TLS routing
    proxy_set_header Host interview-mvp-production-3eef.up.railway.app;
    proxy_ssl_server_name on;
    proxy_ssl_name interview-mvp-production-3eef.up.railway.app;

    # 🔑 Required for proper upstream communication
    proxy_http_version 1.1;

    # 🔑 Required for file uploads (VERY IMPORTANT)
    proxy_request_buffering off;

    # Forward client info
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_connect_timeout 300;
    proxy_send_timeout 300;
    proxy_read_timeout 300;

    client_max_body_size 25m;
}

    location / {
        try_files $uri $uri/ /index.html;
    }
}